<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="monospace" font-size="12">
  <rect width="800" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold">Hello WebSocket — Protocol Sequence</text>

  <!-- Lifelines -->
  <line x1="200" y1="70" x2="200" y2="680" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="600" y1="70" x2="600" y2="680" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Participant labels -->
  <rect x="150" y="50" width="100" height="30" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="200" y="70" text-anchor="middle" font-weight="bold">Client</text>

  <rect x="550" y="50" width="100" height="30" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="600" y="70" text-anchor="middle" font-weight="bold">Server</text>

  <!-- 1. Connect -->
  <line x1="200" y1="100" x2="595" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="95" text-anchor="middle" font-size="11">connect (userId header)</text>
  <text x="610" y="115" font-size="10" fill="#888">session+ [userId]</text>

  <!-- 2. HELLO / BONJOUR -->
  <line x1="205" y1="140" x2="595" y2="140" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="135" text-anchor="middle" font-size="11" fill="#2e7d32">HELLO (client_language)</text>

  <line x1="595" y1="165" x2="205" y2="165" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="160" text-anchor="middle" font-size="11" fill="#2e7d32">BONJOUR (server_language)</text>

  <!-- 3. ECHO (Unary) -->
  <line x1="205" y1="200" x2="595" y2="200" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="195" text-anchor="middle" font-size="11" fill="#e65100">ECHO_REQUEST (id, meta, data)</text>

  <line x1="595" y1="225" x2="205" y2="225" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="220" text-anchor="middle" font-size="11" fill="#e65100">ECHO_RESPONSE (status, results[])</text>

  <!-- 4. PING / PONG (loop every 1s) -->
  <rect x="350" y="245" width="100" height="80" rx="5" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="400" y="260" text-anchor="middle" font-size="10" fill="#6a1b9a">every 1s</text>
  <line x1="595" y1="275" x2="205" y2="275" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="270" text-anchor="middle" font-size="11" fill="#6a1b9a">PING (timestamp_ms)</text>

  <line x1="205" y1="300" x2="595" y2="300" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="295" text-anchor="middle" font-size="11" fill="#6a1b9a">PONG (timestamp_ms)</text>

  <!-- 5. TIME_NOTIFICATION (every 5s) -->
  <rect x="340" y="340" width="120" height="35" rx="5" fill="none" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="400" y="355" text-anchor="middle" font-size="10" fill="#00838f">every 5s</text>
  <line x1="595" y1="370" x2="205" y2="370" stroke="#00bcd4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="365" text-anchor="middle" font-size="11" fill="#00838f">TIME_NOTIFICATION (ts, iso8601)</text>

  <!-- 6. RANDOM / HASH (every 5s) -->
  <rect x="340" y="395" width="120" height="55" rx="5" fill="none" stroke="#f44336" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="400" y="410" text-anchor="middle" font-size="10" fill="#c62828">every 5s</text>
  <line x1="205" y1="425" x2="595" y2="425" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="420" text-anchor="middle" font-size="11" fill="#c62828">RANDOM_NUMBER (id, number)</text>

  <line x1="595" y1="445" x2="205" y2="445" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="440" text-anchor="middle" font-size="11" fill="#c62828">HASH_RESPONSE (id, hash_hex)</text>

  <!-- 7. KISS (every 5s) -->
  <rect x="340" y="465" width="120" height="55" rx="5" fill="none" stroke="#795548" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="400" y="480" text-anchor="middle" font-size="10" fill="#4e342e">every 5s</text>
  <line x1="595" y1="495" x2="205" y2="495" stroke="#795548" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="490" text-anchor="middle" font-size="11" fill="#4e342e">KISS_REQUEST (os info)</text>

  <line x1="205" y1="515" x2="595" y2="515" stroke="#795548" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="510" text-anchor="middle" font-size="11" fill="#4e342e">KISS_RESPONSE (locale)</text>

  <!-- 8. DISCONNECT -->
  <line x1="205" y1="560" x2="595" y2="560" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="555" text-anchor="middle" font-size="11">DISCONNECT (reason)</text>
  <text x="610" y="575" font-size="10" fill="#888">session- [userId]</text>

  <!-- Timeout note -->
  <rect x="350" y="600" width="250" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="475" y="620" text-anchor="middle" font-size="10" fill="#e65100">Session timeout: 60s without PONG</text>
  <text x="475" y="635" text-anchor="middle" font-size="10" fill="#e65100">→ session removed, connection closed</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="currentColor"/>
    </marker>
  </defs>
</svg>
