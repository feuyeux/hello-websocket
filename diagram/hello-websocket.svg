<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="monospace" font-size="12">
  <rect width="900" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold">Hello WebSocket — Architecture</text>

  <!-- Central Protocol Box -->
  <rect x="325" y="250" width="250" height="80" rx="8" fill="#e8f4fd" stroke="#2196f3" stroke-width="2"/>
  <text x="450" y="280" text-anchor="middle" font-size="14" font-weight="bold">Binary WebSocket Protocol</text>
  <text x="450" y="300" text-anchor="middle" font-size="11">PROTOCOL.md</text>
  <text x="450" y="318" text-anchor="middle" font-size="10">8-byte header + payload</text>

  <!-- 12 Language boxes around the center -->
  <!-- Row 1: Java, Kotlin, Python -->
  <rect x="50" y="60" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="110" y="80" text-anchor="middle" font-weight="bold">Java</text>
  <text x="110" y="96" text-anchor="middle" font-size="10">Server + Client</text>

  <rect x="200" y="60" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="260" y="80" text-anchor="middle" font-weight="bold">Kotlin</text>
  <text x="260" y="96" text-anchor="middle" font-size="10">Server + Client</text>

  <rect x="350" y="60" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="410" y="80" text-anchor="middle" font-weight="bold">Python</text>
  <text x="410" y="96" text-anchor="middle" font-size="10">Server + Client</text>

  <!-- Row 1 cont: Go, Rust, C++ -->
  <rect x="500" y="60" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="560" y="80" text-anchor="middle" font-weight="bold">Go</text>
  <text x="560" y="96" text-anchor="middle" font-size="10">Server + Client</text>

  <rect x="650" y="60" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="710" y="80" text-anchor="middle" font-weight="bold">Rust</text>
  <text x="710" y="96" text-anchor="middle" font-size="10">Server + Client</text>

  <rect x="730" y="140" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="790" y="160" text-anchor="middle" font-weight="bold">C++</text>
  <text x="790" y="176" text-anchor="middle" font-size="10">Server + Client</text>

  <!-- Row 2: C#, Dart, PHP (left side) -->
  <rect x="50" y="140" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="110" y="160" text-anchor="middle" font-weight="bold">C#</text>
  <text x="110" y="176" text-anchor="middle" font-size="10">Server + Client</text>

  <rect x="50" y="210" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="110" y="230" text-anchor="middle" font-weight="bold">Dart</text>
  <text x="110" y="246" text-anchor="middle" font-size="10">Server + Client</text>

  <rect x="50" y="350" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="110" y="370" text-anchor="middle" font-weight="bold">PHP</text>
  <text x="110" y="386" text-anchor="middle" font-size="10">Server + Client</text>

  <!-- Right side: Swift, Node.js, TypeScript -->
  <rect x="730" y="210" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="790" y="230" text-anchor="middle" font-weight="bold">Swift</text>
  <text x="790" y="246" text-anchor="middle" font-size="10">Server + Client</text>

  <rect x="730" y="280" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="790" y="300" text-anchor="middle" font-weight="bold">Node.js</text>
  <text x="790" y="316" text-anchor="middle" font-size="10">Server + Client</text>

  <rect x="730" y="350" width="120" height="50" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="790" y="370" text-anchor="middle" font-weight="bold">TypeScript</text>
  <text x="790" y="386" text-anchor="middle" font-size="10">Server + Client</text>

  <!-- Connecting lines from languages to protocol -->
  <line x1="170" y1="85" x2="325" y2="270" stroke="#bbb" stroke-width="1"/>
  <line x1="320" y1="85" x2="370" y2="250" stroke="#bbb" stroke-width="1"/>
  <line x1="470" y1="85" x2="450" y2="250" stroke="#bbb" stroke-width="1"/>
  <line x1="560" y1="110" x2="480" y2="250" stroke="#bbb" stroke-width="1"/>
  <line x1="710" y1="110" x2="540" y2="250" stroke="#bbb" stroke-width="1"/>
  <line x1="170" y1="165" x2="325" y2="275" stroke="#bbb" stroke-width="1"/>
  <line x1="170" y1="235" x2="325" y2="285" stroke="#bbb" stroke-width="1"/>
  <line x1="170" y1="375" x2="325" y2="305" stroke="#bbb" stroke-width="1"/>
  <line x1="730" y1="165" x2="575" y2="275" stroke="#bbb" stroke-width="1"/>
  <line x1="730" y1="235" x2="575" y2="285" stroke="#bbb" stroke-width="1"/>
  <line x1="730" y1="305" x2="575" y2="295" stroke="#bbb" stroke-width="1"/>
  <line x1="730" y1="375" x2="575" y2="305" stroke="#bbb" stroke-width="1"/>

  <!-- Docker layer -->
  <rect x="200" y="450" width="500" height="60" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="450" y="475" text-anchor="middle" font-weight="bold">Docker — 12 Multi-Stage Dockerfiles</text>
  <text x="450" y="495" text-anchor="middle" font-size="10">build_image.sh | run_container.sh | push_image.sh | docker-compose.yml</text>

  <!-- CI layer -->
  <rect x="200" y="530" width="500" height="50" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  <text x="450" y="560" text-anchor="middle" font-weight="bold">CI — GitHub Actions</text>
  <text x="450" y="575" text-anchor="middle" font-size="10">build-test.yml | docker-build-push.yml | dependabot.yml</text>

  <!-- Port label -->
  <text x="450" y="440" text-anchor="middle" font-size="11" fill="#666">Port 9898</text>
</svg>
