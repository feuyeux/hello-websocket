version: 2

updates:
  - package-ecosystem: maven
    directory: /hello-websocket-java
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    rebase-strategy: auto
    commit-message:
      prefix: "deps(java)"
    groups:
      java-non-major:
        patterns: ["*"]
        update-types: [minor, patch]

