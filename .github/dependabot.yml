version: 2
updates:
  # Java
  - package-ecosystem: "maven"
    directory: "/hello-websocket-java"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Shanghai"
    target-branch: "main"
    rebase-strategy: "auto"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

