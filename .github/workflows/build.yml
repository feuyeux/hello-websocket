name: Build & Test

on:
  push:
    branches: ["main", "source"]
  pull_request:
    branches: ["main", "source"]

jobs:
  # ─── Go ──────────────────────────────────────────────
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: cd hello-websocket-go && go build ./...
      - run: cd hello-websocket-go && go test ./...

  # ─── Python ──────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: cd hello-websocket-python && pip install -r requirements.txt pytest
      - run: cd hello-websocket-python && python -m pytest common/codec_test.py -v

  # ─── Node.js ─────────────────────────────────────────
  nodejs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: cd hello-websocket-nodejs && npm install
      - run: cd hello-websocket-nodejs && npm test

  # ─── TypeScript ──────────────────────────────────────
  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: cd hello-websocket-ts && npm install
      - run: cd hello-websocket-ts && npm test

  # ─── Java ────────────────────────────────────────────
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: cd hello-websocket-java && mvn -B clean package

  # ─── Kotlin ──────────────────────────────────────────
  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: cd hello-websocket-kotlin && gradle :server:installDist :client:installDist :common:test --no-daemon

  # ─── Rust ────────────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd hello-websocket-rust && cargo build --verbose
      - run: cd hello-websocket-rust && cargo test --verbose

  # ─── C++ ─────────────────────────────────────────────
  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake g++
      - run: cd hello-websocket-cpp && cmake -B build -DCMAKE_BUILD_TYPE=Release
      - run: cd hello-websocket-cpp && cmake --build build
      - run: cd hello-websocket-cpp/build && ctest --output-on-failure

  # ─── C# ──────────────────────────────────────────────
  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: cd hello-websocket-csharp && dotnet build
      - run: cd hello-websocket-csharp && dotnet test test/hello-websocket-csharp-test.csproj

  # ─── Dart ────────────────────────────────────────────
  dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.9.2'
      - run: cd hello-websocket-dart && dart pub get
      - run: cd hello-websocket-dart && dart test common/codec_test.dart

  # ─── PHP ─────────────────────────────────────────────
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sockets, mbstring
      - run: cd hello-websocket-php && composer install --no-interaction --no-progress
      - run: cd hello-websocket-php && composer test

  # ─── Swift (Windows-only — uses WinSDK) ──────────────
  swift:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        run: |
          choco install swift -y --version=6.1.0 --allow-empty-checksums
      - name: Build
        run: cd hello-websocket-swift && swift build
      - name: Test
        run: cd hello-websocket-swift && swift test
name: Building

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build Rust
      run: cargo build --manifest-path hello-websocket-rust/Cargo.toml 
    - name: Run Rust tests
      run: cargo test --manifest-path hello-websocket-rust/Cargo.toml --verbose
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build server with Maven
      run: mvn -B package --file hello-websocket-java/springboot/server/pom.xml
    - name: Build client with Maven
      run: mvn -B package --file hello-websocket-java/springboot/client/pom.xml