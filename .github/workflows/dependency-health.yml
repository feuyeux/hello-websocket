name: Dependency Health

on:
  schedule:
    - cron: "30 22 * * 0"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: dependency-health
  cancel-in-progress: false

jobs:
  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.0.2
    with:
      scan-args: |-
        --recursive
        ./

  validate-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dependency automation coverage
        run: ruby scripts/validate-dependency-automation.rb
