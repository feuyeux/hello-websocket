version: "3.8"

services:
  ws-server-ts:
    image: feuyeux/ws_server_ts:1.0.0
    ports:
      - "9898:9898"
    networks:
      - ws_network

  ws-client-ts:
    image: feuyeux/ws_client_ts:1.0.0
    environment:
      - WS_SERVER=ws-server-ts
      - WS_PORT=9898
    depends_on:
      - ws-server-ts
    networks:
      - ws_network

networks:
  ws_network:
    driver: bridge
