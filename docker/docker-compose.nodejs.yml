version: "3.8"

services:
  ws-server-node:
    image: feuyeux/ws_server_node:1.0.0
    ports:
      - "9898:9898"
    networks:
      - ws_network

  ws-client-node:
    image: feuyeux/ws_client_node:1.0.0
    environment:
      - WS_SERVER=ws-server-node
      - WS_PORT=9898
    depends_on:
      - ws-server-node
    networks:
      - ws_network

networks:
  ws_network:
    driver: bridge
